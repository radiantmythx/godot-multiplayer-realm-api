services:
  postgres:
    image: postgres:16
    container_name: realm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: realm_auth
      POSTGRES_USER: realm_user
      POSTGRES_PASSWORD: realm_password_change_me
    ports:
      - "5433:5432"
    volumes:
      - realm_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: realm_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: realm_user@zachbrewer.com
      PGADMIN_DEFAULT_PASSWORD: realm_password_change_me
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  realm_pgdata: